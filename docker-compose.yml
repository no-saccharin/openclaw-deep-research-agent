version: "3.8"

services:
  # ── 核心研究 Agent API ──
  research-api:
    build: .
    container_name: openclaw-research-api
    ports:
      - "8088:8088"
    env_file:
      - .env
    volumes:
      - ./research:/app/research
      - ./api:/app/api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── OpenClaw（本地服务器部署） ──
  # 如果你用 npm 全局安装 OpenClaw，则不需要这个 service
  # 直接在宿主机运行: openclaw start
  # 下面是可选的容器化方案：

  # openclaw:
  #   image: node:20-slim
  #   container_name: openclaw-gateway
  #   command: >
  #     bash -c "npm install -g openclaw@latest &&
  #              openclaw start"
  #   ports:
  #     - "18789:18789"
  #   environment:
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #   volumes:
  #     - openclaw-data:/root/.openclaw
  #   restart: unless-stopped
  #   depends_on:
  #     - research-api

volumes:
  openclaw-data: